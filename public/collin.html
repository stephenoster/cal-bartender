<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Collin Thomas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bubble-in: #e9e9eb;
    --bubble-out: #007aff;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #1A1916;
  }

  .chat-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: #fff;
  }

  /* ── HEADER ── */
  .chat-header {
    background: #F5F3EE;
    padding: env(safe-area-inset-top, 44px) 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #C8C4BC;
    flex-shrink: 0;
    position: relative;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chat-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    overflow: hidden;
    background: #C8C4BC;
    flex-shrink: 0;
  }

  .chat-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .header-text {}

  .chat-name {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #1A1916;
    line-height: 1.2;
  }

  .chat-subtitle {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #999690;
    margin-top: 2px;
  }

  .back-link {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #999690;
    text-decoration: none;
    transition: color 0.2s;
  }

  .back-link:hover { color: #1A1916; }

  /* ── MESSAGES ── */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    -webkit-overflow-scrolling: touch;
    background: #fff;
  }

  .messages-area::-webkit-scrollbar { display: none; }

  .time-label {
    text-align: center;
    font-size: 11px;
    color: #8a8a8e;
    margin: 4px 0 8px;
    letter-spacing: 0.02em;
  }

  .bubble-row { display: flex; margin-bottom: 2px; }
  .bubble-row.user { justify-content: flex-end; }
  .bubble-row.collin { justify-content: flex-start; }

  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.45;
    letter-spacing: -0.1px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .bubble.user {
    background: var(--bubble-out);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .bubble.collin {
    background: var(--bubble-in);
    color: #000;
    border-bottom-left-radius: 4px;
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    background: var(--bubble-in);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .dot {
    width: 7px; height: 7px;
    background: #888;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* ── INPUT ── */
  .input-area {
    background: #F5F3EE;
    border-top: 1px solid #C8C4BC;
    padding: 10px 12px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
    display: flex;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: #fff;
    border: 1px solid #C8C4BC;
    border-radius: 20px;
    display: flex;
    align-items: center;
    padding: 8px 14px;
    min-height: 36px;
  }

  .message-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    font-family: inherit;
    background: transparent;
    color: #1A1916;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
  }

  .send-btn {
    width: 32px; height: 32px;
    background: #1A1916;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
    flex-shrink: 0;
    -webkit-appearance: none;
  }

  .send-btn:disabled { opacity: 0.3; }
  .send-btn:not(:disabled):active { transform: scale(0.92); }
  .send-icon { width: 16px; height: 16px; fill: #F5F3EE; }

  .reset-wrap {
    text-align: center;
    padding: 4px 0 2px;
    flex-shrink: 0;
    background: #F5F3EE;
  }

  .reset-btn {
    background: none;
    border: none;
    color: #999690;
    font-size: 10px;
    font-family: inherit;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 4px 8px;
  }
</style>
</head>
<body>

<div class="chat-screen">
  <div class="chat-header">
    <div class="header-left">
      <div class="chat-avatar">
        <img src="collin.jpg" alt="Collin Thomas">
      </div>
      <div class="header-text">
        <div class="chat-name">Collin Thomas</div>
        <div class="chat-subtitle">Craft Bartender</div>
      </div>
    </div>
    <a href="/" class="back-link">← Home</a>
  </div>

  <div class="messages-area" id="messagesArea">
    <div class="time-label">Today</div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea
        class="message-input"
        id="messageInput"
        placeholder="Message"
        rows="1"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" disabled>
      <svg class="send-icon" viewBox="0 0 16 16">
        <path d="M8 2l6 6H9v6H7V8H2z"/>
      </svg>
    </button>
  </div>
  <div class="reset-wrap">
    <button class="reset-btn" id="resetBtn">reset conversation</button>
  </div>
</div>

<script>
let history = [];

const openings = [
  "What can I get you?",
  "Hey, what can I get ya?",
  "What'll it be?",
  "What are we drinking?",
  "What are you looking for?",
  "What kind of mood are you in?",
  "What are we making?",
];

const messagesArea = document.getElementById('messagesArea');
const messageInput = document.getElementById('messageInput');
const sendBtn      = document.getElementById('sendBtn');
const resetBtn     = document.getElementById('resetBtn');

function showOpeningMessage() {
  const msg = openings[Math.floor(Math.random() * openings.length)];
  setTimeout(() => {
    addBubble(msg, 'collin');
    history.push({ role: 'assistant', content: msg });
  }, 600);
}

messageInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  sendBtn.disabled = this.value.trim() === '';
});

messageInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) send();
  }
});

sendBtn.addEventListener('click', send);
resetBtn.addEventListener('click', reset);

function addBubble(text, role) {
  const row = document.createElement('div');
  row.className = `bubble-row ${role}`;
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = text;
  row.appendChild(bubble);
  messagesArea.appendChild(row);
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'bubble-row collin';
  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  ind.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(ind);
  messagesArea.appendChild(row);
  messagesArea.scrollTop = messagesArea.scrollHeight;
  return row;
}

async function send() {
  const text = messageInput.value.trim();
  if (!text) return;

  addBubble(text, 'user');
  history.push({ role: 'user', content: text });

  messageInput.value = '';
  messageInput.style.height = 'auto';
  sendBtn.disabled = true;
  messageInput.disabled = true;

  const typingRow = showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    const data = await res.json();
    typingRow.remove();

    const reply = data.content?.find(b => b.type === 'text')?.text
      || "Hey. Something went sideways on my end, try again?";

    history.push({ role: 'assistant', content: reply });

    const paragraphs = reply.split(/\n\n+/).filter(p => p.trim());
    for (let i = 0; i < paragraphs.length; i++) {
      if (i > 0) await new Promise(r => setTimeout(r, 350));
      addBubble(paragraphs[i].trim(), 'collin');
    }

  } catch (err) {
    typingRow.remove();
    addBubble("Hey. Something went sideways on my end, try again?", 'collin');
  }

  messageInput.disabled = false;
  messageInput.focus();
}

function reset() {
  history = [];
  messagesArea.innerHTML = '<div class="time-label">Today</div>';
  showOpeningMessage();
}

showOpeningMessage();
</script>
</body>
</html>
