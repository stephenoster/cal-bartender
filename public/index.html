<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    background: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .phone-frame {
    width: 390px;
    max-width: 100%;
    background: #000;
    border-radius: 48px;
    padding: 12px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.1);
  }

  .phone-screen {
    background: #fff;
    border-radius: 38px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 780px;
  }

  .status-bar {
    background: #f2f2f7;
    padding: 14px 24px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 600;
  }

  .header {
    background: #f2f2f7;
    padding: 8px 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-bottom: 0.5px solid rgba(0,0,0,0.12);
  }

  .contact-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2d2d2d 0%, #4a4a4a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 4px;
    font-family: 'Newsreader', serif;
    font-style: italic;
  }

  .contact-name {
    font-size: 16px;
    font-weight: 600;
    color: #000;
    letter-spacing: -0.2px;
  }

  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: #fff;
    scroll-behavior: smooth;
  }

  .messages-area::-webkit-scrollbar { display: none; }

  .bubble-row { display: flex; margin-bottom: 2px; }
  .bubble-row.user { justify-content: flex-end; }
  .bubble-row.cal  { justify-content: flex-start; }

  .bubble {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.45;
    letter-spacing: -0.1px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .bubble.user {
    background: #007aff;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .bubble.cal {
    background: #e9e9eb;
    color: #000;
    border-bottom-left-radius: 4px;
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    background: #e9e9eb;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .dot {
    width: 7px; height: 7px;
    background: #888;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .input-area {
    background: #f2f2f7;
    border-top: 0.5px solid rgba(0,0,0,0.12);
    padding: 10px 12px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .input-wrap {
    flex: 1;
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.18);
    border-radius: 20px;
    display: flex;
    align-items: center;
    padding: 8px 14px;
    min-height: 36px;
  }

  .message-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 15px;
    font-family: inherit;
    background: transparent;
    color: #000;
    resize: none;
    max-height: 80px;
    line-height: 1.4;
  }

  .send-btn {
    width: 32px; height: 32px;
    background: #007aff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
    flex-shrink: 0;
  }

  .send-btn:disabled { opacity: 0.4; cursor: default; }
  .send-btn:not(:disabled):active { transform: scale(0.92); }

  .send-icon { width: 16px; height: 16px; fill: #fff; }

  .time-label {
    text-align: center;
    font-size: 11px;
    color: #8a8a8e;
    margin: 8px 0 4px;
    letter-spacing: 0.02em;
  }

  .reset-btn {
    margin-top: 1.25rem;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.7);
  }
</style>
</head>
<body>

<div class="label">Cal — prototype v1</div>

<div class="phone-frame">
  <div class="phone-screen">
    <div class="status-bar">
      <span>9:41</span>
      <span>●●●</span>
    </div>

    <div class="header">
      <div class="contact-avatar">CB</div>
      <div class="contact-name">Cal the bartender</div>
    </div>

    <div class="messages-area" id="messagesArea">
      <div class="time-label">Today</div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          class="message-input"
          id="messageInput"
          placeholder="iMessage"
          rows="1"
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" disabled>
        <svg class="send-icon" viewBox="0 0 16 16">
          <path d="M8 2l6 6H9v6H7V8H2z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<button class="reset-btn" id="resetBtn">reset conversation</button>

<script>
let history = [];

const messagesArea = document.getElementById('messagesArea');
const messageInput = document.getElementById('messageInput');
const sendBtn      = document.getElementById('sendBtn');
const resetBtn     = document.getElementById('resetBtn');

messageInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
  sendBtn.disabled = this.value.trim() === '';
});

messageInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) send();
  }
});

sendBtn.addEventListener('click', send);
resetBtn.addEventListener('click', reset);

function addBubble(text, role) {
  const row = document.createElement('div');
  row.className = `bubble-row ${role}`;
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = text;
  row.appendChild(bubble);
  messagesArea.appendChild(row);
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'bubble-row cal';
  const ind = document.createElement('div');
  ind.className = 'typing-indicator';
  ind.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(ind);
  messagesArea.appendChild(row);
  messagesArea.scrollTop = messagesArea.scrollHeight;
  return row;
}

async function send() {
  const text = messageInput.value.trim();
  if (!text) return;

  addBubble(text, 'user');
  history.push({ role: 'user', content: text });

  messageInput.value = '';
  messageInput.style.height = 'auto';
  sendBtn.disabled = true;
  messageInput.disabled = true;

  const typingRow = showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    const data = await res.json();
    typingRow.remove();

    const reply = data.content?.find(b => b.type === 'text')?.text
      || "Hey. Something went sideways on my end — try again?";

    history.push({ role: 'assistant', content: reply });

    const paragraphs = reply.split(/\n\n+/).filter(p => p.trim());
    for (let i = 0; i < paragraphs.length; i++) {
      if (i > 0) await new Promise(r => setTimeout(r, 350));
      addBubble(paragraphs[i].trim(), 'cal');
    }

  } catch (err) {
    typingRow.remove();
    addBubble("Hey. Something went sideways on my end — try again?", 'cal');
  }

  messageInput.disabled = false;
  messageInput.focus();
}

function reset() {
  history = [];
  messagesArea.innerHTML = '<div class="time-label">Today</div>';
}
</script>
</body>
</html>
