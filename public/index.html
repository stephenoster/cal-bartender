<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Collin Thomas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --gunmetal: #32373B;
    --iron-grey: #4A5859;
    --almond: #F4D6CC;
    --honey: #F4B860;
    --brick: #C83E4D;
    --dark: #1e2224;
    --bubble-in: #e9e9eb;
    --bubble-out: #007aff;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
    color: var(--almond);
  }

  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px);
  }

  /* ── LANDING ── */
  #landing {
    align-items: center;
    justify-content: center;
    background: var(--gunmetal);
    padding: 2.5rem 2rem;
  }

  /* subtle top bar accent */
  #landing::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--brick), var(--honey));
  }

  .landing-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 340px;
    width: 100%;
  }

  /* Avatar */
  .avatar-wrap {
    position: relative;
    width: 120px;
    height: 120px;
    margin-bottom: 1.5rem;
  }

  .avatar-ring {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--honey), var(--brick));
    padding: 3px;
  }

  .avatar-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid var(--gunmetal);
    position: relative;
    z-index: 1;
  }

  .avatar-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  /* Text */
  .name {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.02em;
    text-align: center;
    margin-bottom: 0.3rem;
  }

  .title {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--honey);
    text-align: center;
    margin-bottom: 1.75rem;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(244,184,96,0.4), transparent);
    margin: 0 auto 1.75rem;
  }

  .bio {
    font-size: 0.95rem;
    line-height: 1.7;
    color: rgba(244,214,204,0.65);
    text-align: center;
    font-weight: 300;
    letter-spacing: 0.01em;
    margin-bottom: 2.5rem;
    max-width: 260px;
  }

  .cta-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    max-width: 260px;
    padding: 16px 24px;
    background: var(--honey);
    color: var(--gunmetal);
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    -webkit-appearance: none;
  }

  .cta-btn:active {
    background: var(--almond);
    transform: scale(0.97);
  }

  /* ── CHAT ── */
  #chat {
    background: #fff;
    display: flex;
    flex-direction: column;
  }

  .chat-header {
    background: #f2f2f7;
    padding: env(safe-area-inset-top, 44px) 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-bottom: 0.5px solid rgba(0,0,0,0.12);
    flex-shrink: 0;
    position: relative;
  }

  /* top accent strip on chat header */
  .chat-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--brick), var(--honey));
  }

  .chat-back {
    position: absolute;
    left: 16px;
    top: calc(env(safe-area-inset-top, 44px) + 10px);
    background: none;
    border: none;
    color: #007aff;
    font-size: 0.95rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    padding: 4px 0;
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .chat-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    overflow: hidden;
    margin-bottom: 4px;
    border: 2px solid var(--honey);
  }

  .chat-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .chat-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: #000;
    letter-spacing: -0.2px;
  }

  .chat-subtitle {
    font-size: 0.72rem;
    color: #8a8a8e;
    margin-top: 1px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }

  .messages-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    -webkit-overflow-scrolling: touch;
  }

  .messages-area::-webkit-scrollbar { display: none; }

  .time-label {
    text-align: center;
    font-size: 11px;
    color: #8a8a8e;
    margin: 4px 0 8px;
    letter-spacing: 0.02em;
  }

  .bubble-row { display: flex; margin-bottom: 2px; }
  .bubble-row.user { justify-content: flex-end; }
  .bubble-row.collin { justify-content: flex-start; }

  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.45;
    letter-spacing: -0.1px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .bubble.user {
    background: var(--bubble-out);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .bubble.collin {
    background: var(--bubble-in);
    color: #000;
    border-bottom-left-radius: 4px;
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 10px 14px;
    background: var(--bubble-in);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .dot {
    width: 7px; height: 7px;
    background: #888;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .input-area {
    background: #f2f2f7;
    border-top: 0.5px solid rgba(0,0,0,0.12);
    padding: 10px 12px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
    display: flex;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.18);
    border-radius: 20px;
    display: flex;
    align-items: center;
    padding: 8px 14px;
    min-height: 36px;
  }

  .message-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    font-family: inherit;
    background: transparent;
    color: #000;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
  }

  .send-btn {
    width: 32px; height: 32px;
    background: var(--bubble-out);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s, transform 0.1s;
    flex-shrink: 0;
    -webkit-appearance: none;
  }

  .send-btn:disabled { opacity: 0.4; }
  .send-btn:not(:disabled):active { transform: scale(0.92); }
  .send-icon { width: 16px; height: 16px; fill: #fff; }

  .reset-wrap {
    text-align: center;
    padding: 6px 0 2px;
    flex-shrink: 0;
    background: #f2f2f7;
  }

  .reset-btn {
    background: none;
    border: none;
    color: #8a8a8e;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    letter-spacing: 0.04em;
    padding: 4px 8px;
  }
</style>
</head>
<body>

<!-- LANDING -->
<div class="screen" id="landing">
  <div class="landing-inner">

    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar-circle">
        <img src="collin.jpg" alt="Collin Thomas">
      </div>
    </div>

    <div class="name">Collin Thomas</div>
    <div class="title">Your Craft Bartender</div>
    <div class="divider"></div>
    <div class="bio">Twenty years behind the bar. He knows what to make and exactly how to make it.</div>

    <button class="cta-btn" id="startBtn">
      💬&nbsp; Text Collin
    </button>

  </div>
</div>

<!-- CHAT -->
<div class="screen hidden" id="chat">
  <div class="chat-header">
    <button class="chat-back" id="backBtn">‹ Back</button>
    <div class="chat-avatar">
      <img src="collin.jpg" alt="Collin Thomas">
    </div>
    <div class="chat-name">Collin Thomas</div>
    <div class="chat-subtitle">craft bartender</div>
  </div>

  <div class="messages-area" id="messagesArea">
    <div class="time-label">Today</div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea
        class="message-input"
        id="messageInput"
        placeholder="iMessage"
        rows="1"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" disabled>
      <svg class="send-icon" viewBox="0 0 16 16">
        <path d="M8 2l6 6H9v6H7V8H2z"/>
      </svg>
    </button>
  </div>
  <div class="reset-wrap">
    <button class="reset-btn" id="resetBtn">reset conversation</button>
  </div>
</div>

<script>
let history = [];
let chatStarted = false;
let onboardingState = null; // null | 'prompted' | 'name' | 'bar' | 'palate' | 'done'
let onboardingTimer = null;
let userName = null;

const openings = [
    "What can I get you?",
    "Hey, what can I get ya?",
    "What'll it be?",
    "What are we drinking?",
    "What are you looking for?",
    "What kind of mood are you in?",
    "What are we making?",
];

const landing    = document.getElementById('landing');
const chatScreen = document.getElementById('chat');
const startBtn   = document.getElementById('startBtn');
const backBtn    = document.getElementById('backBtn');
const messagesArea = document.getElementById('messagesArea');
const messageInput = document.getElementById('messageInput');
const sendBtn    = document.getElementById('sendBtn');
const resetBtn   = document.getElementById('resetBtn');

startBtn.addEventListener('click', () => {
    landing.classList.add('hidden');
    chatScreen.classList.remove('hidden');
    if (!chatStarted) {
        chatStarted = true;
        showOpeningMessage();
    }
    setTimeout(() => messageInput.focus(), 400);
});

backBtn.addEventListener('click', () => {
    chatScreen.classList.add('hidden');
    landing.classList.remove('hidden');
});

function showOpeningMessage() {
    const msg = openings[Math.floor(Math.random() * openings.length)];
    setTimeout(() => {
        addBubble(msg, 'collin');
        history.push({ role: 'assistant', content: msg });
    }, 600);
}

messageInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    sendBtn.disabled = this.value.trim() === '';
});

messageInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) send();
    }
});

sendBtn.addEventListener('click', send);
resetBtn.addEventListener('click', reset);

function addBubble(text, role) {
    const row = document.createElement('div');
    row.className = `bubble-row ${role}`;
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    row.appendChild(bubble);
    messagesArea.appendChild(row);
    messagesArea.scrollTop = messagesArea.scrollHeight;
}

function showTyping() {
    const row = document.createElement('div');
    row.className = 'bubble-row collin';
    const ind = document.createElement('div');
    ind.className = 'typing-indicator';
    ind.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    row.appendChild(ind);
    messagesArea.appendChild(row);
    messagesArea.scrollTop = messagesArea.scrollHeight;
    return row;
}

function handleOnboardingReply(text) {
    const lower = text.toLowerCase().trim();

    if (onboardingState === 'prompted') {
        const affirmative = ['yes', 'yeah', 'yep', 'sure', 'ok', 'okay', 'y', 'yup', 'absolutely', 'let\'s go', 'lets go', 'go ahead', 'hit me'];
        if (affirmative.some(a => lower.includes(a))) {
            onboardingState = 'name';
            setTimeout(() => {
                const msg = "What's your name?";
                addBubble(msg, 'collin');
                history.push({ role: 'assistant', content: msg });
            }, 800);
        } else {
            onboardingState = 'done';
            setTimeout(() => {
                const msg = "No worries. Next time then.";
                addBubble(msg, 'collin');
                history.push({ role: 'assistant', content: msg });
            }, 800);
        }
        return true;
    }

    if (onboardingState === 'name') {
        userName = text.trim();
        onboardingState = 'bar';
        setTimeout(() => {
            const msg = `${userName}. Got it. What kinda bar are we working with?\n\nA. Japanese whisky, small-batch amaro, Luxardo cherries, perfect clear ice\nB. Good bourbon, decent tequila, real bitters, cold vermouth, fresh citrus always\nC. Solid well spirits, a few interesting bottles, building the collection\nD. Whatever looked good at the store — kind of a mess but there's good stuff in there`;
            addBubble(msg, 'collin');
            history.push({ role: 'assistant', content: msg });
        }, 800);
        return true;
    }

    if (onboardingState === 'bar') {
        onboardingState = 'palate';
        setTimeout(() => {
            const msg = "Last one — how do you usually drink? Strong and stirred, or something with citrus and life to it?";
            addBubble(msg, 'collin');
            history.push({ role: 'assistant', content: msg });
        }, 800);
        return true;
    }

    if (onboardingState === 'palate') {
        onboardingState = 'done';
        setTimeout(() => {
            const msg = "Got it. I'll remember all that. Next time you text me I'll already know your bar.";
            addBubble(msg, 'collin');
            history.push({ role: 'assistant', content: msg });
        }, 800);
        return true;
    }

    return false;
}

function scheduleOnboardingPrompt() {
    if (onboardingTimer) clearTimeout(onboardingTimer);
    // 5 minutes — change to 5000 (5 seconds) for testing
    onboardingTimer = setTimeout(() => {
        if (onboardingState !== null) return; // already started
        onboardingState = 'prompted';
        const msg = "Hey real quick, I want to save your bar so next time I'm not starting from scratch. Just three questions. You in?";
        addBubble(msg, 'collin');
        history.push({ role: 'assistant', content: msg });
    }, 5000);
}

async function send() {
    const text = messageInput.value.trim();
    if (!text) return;

    // If we're mid-onboarding, handle it locally — don't call the API
    if (onboardingState && onboardingState !== 'done') {
        addBubble(text, 'user');
        messageInput.value = '';
        messageInput.style.height = 'auto';
        sendBtn.disabled = true;
        handleOnboardingReply(text);
        sendBtn.disabled = false;
        messageInput.focus();
        return;
    }

    addBubble(text, 'user');
    history.push({ role: 'user', content: text });

    messageInput.value = '';
    messageInput.style.height = 'auto';
    sendBtn.disabled = true;
    messageInput.disabled = true;

    const typingRow = showTyping();

    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: history })
        });

        const data = await res.json();
        typingRow.remove();

        let reply = data.content?.find(b => b.type === 'text')?.text
            || "Hey. Something went sideways on my end — try again?";

        // Detect and strip [RECIPE] marker
        if (reply.includes('[RECIPE]')) {
            reply = reply.replace('[RECIPE]', '').trimEnd();
            scheduleOnboardingPrompt();
        }

        history.push({ role: 'assistant', content: reply });

        const paragraphs = reply.split(/\n\n+/).filter(p => p.trim());
        for (let i = 0; i < paragraphs.length; i++) {
            if (i > 0) await new Promise(r => setTimeout(r, 350));
            addBubble(paragraphs[i].trim(), 'collin');
        }

    } catch (err) {
        typingRow.remove();
        addBubble("Hey. Something went sideways on my end — try again?", 'collin');
    }

    messageInput.disabled = false;
    messageInput.focus();
}

function reset() {
    history = [];
    chatStarted = false;
    onboardingState = null;
    onboardingTimer && clearTimeout(onboardingTimer);
    onboardingTimer = null;
    userName = null;
    messagesArea.innerHTML = '<div class="time-label">Today</div>';
    chatStarted = true;
    showOpeningMessage();
}
</script>
</body>
</html>
